<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公众号排版生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.8;
            color: #333;
            max-width: 677px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .container {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .subtitle {
            font-size: 14px;
            color: #999;
            margin-bottom: 30px;
            font-style: italic;
        }

        h2 {
            font-size: 17px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 35px 0 16px 0;
            padding-left: 12px;
            border-left: 4px solid #07c160;
        }

        h3 {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin: 24px 0 12px 0;
        }

        p {
            margin: 16px 0;
            text-align: justify;
        }

        .highlight {
            background: linear-gradient(120deg, #ffeaa7 0%, #fff3cd 100%);
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
        }

        .quote {
            background: #f8f9fa;
            border-left: 4px solid #07c160;
            padding: 16px 20px;
            margin: 20px 0;
            border-radius: 0 4px 4px 0;
            color: #555;
            font-size: 15px;
        }

        .card {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 16px 20px;
            margin: 16px 0;
        }

        .card-title {
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 14px;
        }

        th, td {
            border: 1px solid #e1e4e8;
            padding: 12px 10px;
            text-align: left;
        }

        th {
            background: #f6f8fa;
            font-weight: 600;
            color: #1a1a1a;
        }

        tr:nth-child(even) {
            background: #fafbfc;
        }

        ul, ol {
            margin: 16px 0 16px 24px;
        }

        li {
            margin: 8px 0;
            line-height: 1.8;
        }

        .divider {
            height: 1px;
            background: #e9ecef;
            margin: 40px 0;
        }

        .footer {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }

        .footer a {
            color: #07c160;
            text-decoration: none;
        }

        .code-block {
            background: #f6f8fa;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 16px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            overflow-x: auto;
            margin: 16px 0;
            color: #24292e;
        }

        .step {
            display: flex;
            align-items: flex-start;
            margin: 12px 0;
        }

        .step-num {
            background: #07c160;
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
            margin-right: 12px;
        }

        .action-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #07c160;
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(7, 193, 96, 0.4);
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: #06ad56;
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(7, 193, 96, 0.5);
        }

        .tips {
            background: #e7f3ff;
            border-left: 4px solid #1890ff;
            padding: 16px 20px;
            margin: 20px 0;
            border-radius: 0 4px 4px 0;
            font-size: 14px;
            color: #333;
        }

        .warning {
            background: #fff7e6;
            border-left: 4px solid #fa8c16;
            padding: 16px 20px;
            margin: 20px 0;
            border-radius: 0 4px 4px 0;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container" id="content">
        <!-- 内容将由 JavaScript 动态生成 -->
    </div>

    <button class="action-btn" onclick="copyContent()">复制全部内容</button>

    <script>
        // 这里放入转换后的内容
        const articleContent = `
            <h1>让 AI 当你的数据分析师 — 数据取数自动化实践</h1>
            <p class="subtitle">本文是我用 AI 解决数据问题一年多的实践沉淀。不是教程，是一个真实工作流从 0 到 1 的演化过程。</p>

            <div class="divider"></div>

            <h2>01 为什么是数据取数？</h2>
            <p>过去这一年多，我一直在尝试用 AI 解决数据问题。</p>
            <p>试过各种方案——从最早的"帮我看下这个表有什么数据"，到后来让 AI 直接生成 SQL、跑分析、出报表。</p>
            <p>大部分尝试都失败了——要么 AI 理解不了业务口径，要么生成的东西没法直接用。</p>
            <p>但有一个 Skill，我坚持用了一年多，而且用得越来越多：<span class="highlight">数据取数自动化。</span></p>
            <p>一开始我只是想"省点事"——不用每次都跟 AI 描述表结构、字段含义、过滤条件。</p>
            <p>但用了一年多后，我发现它带来的价值远超预期：</p>

            <div class="quote">验证数据：上线前看转化漏斗、功能渗透率、留存曲线</div>
            <div class="quote">收集数据：周报月报要的核心指标、老板突然问的"那个数据"</div>
            <div class="quote">产品分析：用户行为路径、功能使用情况、异常波动定位</div>
            <div class="quote">快速汇报：临时被叫去开会，5 分钟拉出关键数据</div>

            <p>它不再是一个"取数工具"，而是一个 <span class="highlight">全职数据分析师</span>。</p>

            <div class="divider"></div>

            <h2>02 核心架构：数据知识库 + SQL 规则引擎</h2>
            <p>我的 <code>/data</code> Skill 不是简单的"SQL 生成器"。</p>
            <p>它是一套完整的数据知识体系 + 分析能力：</p>

            <div class="card">
                <div class="card-title">用户问："过去 7 天的 DAU 怎么样？"</div>
                <div class="card-body">
                    <div class="step">
                        <div class="step-num">1</div>
                        <div>识别指标：DAU = 日活跃用户数</div>
                    </div>
                    <div class="step">
                        <div class="step-num">2</div>
                        <div>查数据字典：用户行为日志在 t_event_log，user_id 标识用户</div>
                    </div>
                    <div class="step">
                        <div class="step-num">3</div>
                        <div>应用业务规则：排除测试账号、只算正式环境</div>
                    </div>
                    <div class="step">
                        <div class="step-num">4</div>
                        <div>生成 SQL → 执行 → 格式化输出</div>
                    </div>
                    <div class="step">
                        <div class="step-num">5</div>
                        <div>可选：生成趋势图、对比上周、计算环比</div>
                    </div>
                </div>
            </div>

            <p class="highlight" style="text-align: center; padding: 16px;">关键不是 AI 会写 SQL——是它理解你的业务数据。</p>
        `;

        document.getElementById('content').innerHTML = articleContent;

        function copyContent() {
            const content = document.getElementById('content').innerHTML;
            navigator.clipboard.writeText(content).then(() => {
                alert('HTML 代码已复制到剪贴板！');
            }).catch(err => {
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = content;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('HTML 代码已复制到剪贴板！');
            });
        }
    </script>
</body>
</html>
